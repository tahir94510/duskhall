name: Keep Supabase awake

# Supabase projects on the Free plan are PAUSED after ~7 days with no activity, which would take
# the realtime table offline until someone manually restores it. This workflow sends a tiny request
# to the project on a schedule so the inactivity timer keeps resetting and the project never sleeps.
#
# One-time setup (repo Settings -> Secrets and variables -> Actions -> New repository secret):
#   SUPABASE_URL       e.g. https://<project-ref>.supabase.co   (same as VITE_SUPABASE_URL)
#   SUPABASE_ANON_KEY  the project's anon/public key            (same as VITE_SUPABASE_ANON_KEY)
# Both are public values (they ship in the web client), so they are safe to store as Actions secrets.
#
# Note: GitHub disables scheduled workflows after ~60 days with no repo activity; normal development
# keeps it enabled. You can also run it by hand any time from the Actions tab (workflow_dispatch).

on:
  schedule:
    # Daily at 09:17 UTC. Daily (well inside the 7-day window) keeps margin even if GitHub skips or
    # delays a run under load. The odd minute avoids the top-of-hour scheduling rush.
    - cron: "17 9 * * *"
  workflow_dispatch: {}

# Don't pile up runs if one is slow; the latest scheduled tick is all that matters.
concurrency:
  group: keep-supabase-awake
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping Supabase so it does not auto-pause
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_URL:-}" ] || [ -z "${SUPABASE_ANON_KEY:-}" ]; then
            echo "::error::Missing secrets. Add SUPABASE_URL and SUPABASE_ANON_KEY under" \
                 "Settings -> Secrets and variables -> Actions."
            exit 1
          fi
          base="${SUPABASE_URL%/}"
          echo "Pinging $base"

          # PostgREST root: a database-backed request (PostgREST reads the catalog to answer), which
          # is genuine project activity and resets the idle timer. Auth health is a second, separate
          # touch. We treat ANY HTTP status as "the project is awake and served us" — only a network
          # failure (curl exit / code 000) is an error worth flagging.
          rest=$(curl -sS -m 30 -o /dev/null -w "%{http_code}" \
                   -H "apikey: $SUPABASE_ANON_KEY" \
                   -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
                   "$base/rest/v1/" || echo "000")
          echo "rest/v1/        -> HTTP $rest"

          health=$(curl -sS -m 30 -o /dev/null -w "%{http_code}" \
                     -H "apikey: $SUPABASE_ANON_KEY" \
                     "$base/auth/v1/health" || echo "000")
          echo "auth/v1/health  -> HTTP $health"

          if [ "$rest" = "000" ] && [ "$health" = "000" ]; then
            echo "::error::No response from Supabase (network failure, wrong URL, or already paused)."
            exit 1
          fi
          echo "Supabase reachable; inactivity timer reset."
