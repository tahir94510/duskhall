<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Vaerum</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <script>
      // Defensive SPA fallback. If the host ever serves this 404 page for a path that
      // LOOKS like a real room code, bounce to it so the app can pick it up. Anything
      // else is a genuinely broken link, so we stay here and show the card (no redirect
      // loop on a malformed path).
      (function () {
        var p = (window.location.pathname || "/").replace(/^\/+/, "").replace(/\/+$/, "");
        if (/^[A-Z0-9]{6}$/i.test(p)) {
          window.location.replace("/" + p.toUpperCase());
        }
      })();
    </script>
    <script>
      // Localise the page to TR/EN with the SAME priority as i18n.detectLocale
      // (?lang= -> localStorage "kabal:lang" -> navigator language), before paint.
      (function () {
        try {
          var L = {
            en: { t: "Vaerum", h: "Page not found.", p: "That link does not point to a known Vaerum room.", a: "Open a new room" },
            tr: { t: "Vaerum", h: "Sayfa bulunamadı.", p: "Bu bağlantı bilinen bir Vaerum odasına gitmiyor.", a: "Yeni bir oda aç" }
          };
          var q = new URLSearchParams(location.search).get("lang");
          var stored = null;
          try { stored = localStorage.getItem("kabal:lang"); } catch (e) {}
          var nav = (navigator.language || "en").toLowerCase();
          var loc = (q && L[q]) ? q : (stored && L[stored]) ? stored : nav.indexOf("tr") === 0 ? "tr" : "en";
          var s = L[loc];
          document.documentElement.setAttribute("lang", loc);
          document.title = s.t;
          document.addEventListener("DOMContentLoaded", function () {
            var h = document.getElementById("nf-title");
            var tx = document.getElementById("nf-text");
            var a = document.getElementById("nf-link");
            if (h) h.textContent = s.h;
            if (tx) tx.textContent = s.p;
            if (a) a.textContent = s.a;
          });
        } catch (e) {}
      })();
    </script>
    <style>
      html, body {
        margin: 0; padding: 0; height: 100%;
        background: #000; color: #f3efe5;
        font-family: "Inter", system-ui, -apple-system, sans-serif;
      }
      .wrap {
        position: fixed; inset: 0;
        display: grid; place-items: center;
        text-align: center; padding: 24px;
      }
      .card {
        max-width: 360px;
        border: 1px solid rgba(243, 239, 229, 0.14);
        border-radius: 14px;
        padding: 28px 24px;
        background: #0a0a0a;
      }
      svg { width: 40px; height: 56px; margin: 0 auto 14px; }
      h1 { margin: 0 0 6px; font-size: 16px; font-weight: 600; }
      p { margin: 0 0 18px; font-size: 13px; line-height: 1.55; color: #aea99d; }
      a {
        display: inline-block; padding: 8px 18px;
        background: #f3efe5; color: #000; text-decoration: none;
        border-radius: 8px; font-weight: 600; font-size: 12px;
        letter-spacing: 0.04em;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <svg viewBox="0 0 48 64" xmlns="http://www.w3.org/2000/svg">
          <g fill="none" stroke="#f3efe5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M24 4 L40 32 L24 60 L8 32 Z" />
            <path d="M24 4 L24 60" />
            <circle cx="24" cy="32" r="3.5" fill="#f3efe5" stroke="none" />
          </g>
        </svg>
        <h1 id="nf-title">Page not found.</h1>
        <p id="nf-text">That link does not point to a known Vaerum room.</p>
        <a id="nf-link" href="/">Open a new room</a>
      </div>
    </div>
  </body>
</html>
