<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Vaerum</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <script>
      // Defensive SPA fallback. If the host ever serves this 404 page for a path that
      // LOOKS like a real room code, bounce to it so the app can pick it up. Anything
      // else is a genuinely broken link, so we stay here and show the card (no redirect
      // loop on a malformed path).
      (function () {
        var p = (window.location.pathname || "/").replace(/^\/+/, "").replace(/\/+$/, "");
        if (/^[A-Z0-9]{6}$/i.test(p)) {
          window.location.replace("/" + p.toUpperCase());
        }
      })();
    </script>
    <script>
      // Localise the page to TR/EN with the SAME priority as i18n.detectLocale
      // (?lang= -> localStorage "vaerum:lang" -> navigator language), before paint.
      (function () {
        try {
          var L = {
            en: { t: "Vaerum", h: "Page not found.", p: "That link does not point to a known Vaerum room.", a: "Open a new room" },
            tr: { t: "Vaerum", h: "Sayfa bulunamadı.", p: "Bu bağlantı bilinen bir Vaerum odasına gitmiyor.", a: "Yeni bir oda aç" }
          };
          var q = new URLSearchParams(location.search).get("lang");
          var stored = null;
          try { stored = localStorage.getItem("vaerum:lang"); } catch (e) {}
          var nav = (navigator.language || "en").toLowerCase();
          var loc = (q && L[q]) ? q : (stored && L[stored]) ? stored : nav.indexOf("tr") === 0 ? "tr" : "en";
          var s = L[loc];
          document.documentElement.setAttribute("lang", loc);
          document.title = s.t;
          document.addEventListener("DOMContentLoaded", function () {
            var h = document.getElementById("nf-title");
            var tx = document.getElementById("nf-text");
            var a = document.getElementById("nf-link");
            if (h) h.textContent = s.h;
            if (tx) tx.textContent = s.p;
            if (a) a.textContent = s.a;
          });
        } catch (e) {}
      })();
    </script>
    <style>
      html, body {
        margin: 0; padding: 0; height: 100%;
        /* Same atmospheric backdrop as the live table, so a broken link still feels
           like Vaerum rather than a blank error page. */
        background-color: #07060b;
        background-image:
          radial-gradient(120% 90% at 50% 32%, rgba(96, 86, 126, 0.22) 0%, rgba(20, 18, 28, 0) 58%),
          radial-gradient(150% 120% at 50% 120%, rgba(54, 47, 74, 0.26) 0%, rgba(8, 8, 12, 0) 64%),
          linear-gradient(180deg, #0c0a12 0%, #08070b 52%, #050406 100%);
        background-repeat: no-repeat; background-size: cover;
        color: #f3efe5;
        font-family: "Inter", system-ui, -apple-system, sans-serif;
      }
      .wrap {
        position: fixed; inset: 0;
        display: grid; place-items: center;
        text-align: center; padding: 24px;
      }
      /* Premium frosted panel matching the in-app modals/zone trays. */
      .card {
        max-width: 380px;
        border: 1px solid rgba(243, 239, 229, 0.16);
        border-radius: 16px;
        padding: 32px 28px;
        background:
          radial-gradient(120% 90% at 50% 0%, rgba(243, 239, 229, 0.06) 0%, rgba(243, 239, 229, 0) 60%),
          linear-gradient(180deg, rgba(22, 21, 28, 0.92) 0%, rgba(12, 11, 16, 0.94) 100%);
        box-shadow: 0 18px 48px rgba(0, 0, 0, 0.55), inset 0 1px 0 rgba(243, 239, 229, 0.07), inset 0 0 0 1px rgba(0, 0, 0, 0.3);
        -webkit-backdrop-filter: blur(12px) saturate(115%);
        backdrop-filter: blur(12px) saturate(115%);
      }
      svg { width: 42px; height: 58px; margin: 0 auto 16px; filter: drop-shadow(0 2px 10px rgba(0, 0, 0, 0.5)); }
      h1 { margin: 0 0 6px; font-size: 16px; font-weight: 600; letter-spacing: 0.02em; }
      p { margin: 0 0 18px; font-size: 13px; line-height: 1.55; color: #aea99d; }
      a {
        display: inline-block; padding: 10px 22px;
        background: linear-gradient(180deg, #f7f3ea 0%, #e9e4d8 100%); color: #0a0a0a; text-decoration: none;
        border-radius: 9px; font-weight: 600; font-size: 12px;
        letter-spacing: 0.06em; text-transform: uppercase;
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.45), inset 0 1px 0 rgba(255, 255, 255, 0.5);
        transition: transform 0.18s ease, filter 0.18s ease;
      }
      a:hover { filter: brightness(1.05); transform: translateY(-1px); }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <svg viewBox="0 0 48 64" xmlns="http://www.w3.org/2000/svg">
          <g fill="none" stroke="#f3efe5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M24 4 L40 32 L24 60 L8 32 Z" />
            <path d="M24 4 L24 60" />
            <circle cx="24" cy="32" r="3.5" fill="#f3efe5" stroke="none" />
          </g>
        </svg>
        <h1 id="nf-title">Page not found.</h1>
        <p id="nf-text">That link does not point to a known Vaerum room.</p>
        <a id="nf-link" href="/">Open a new room</a>
      </div>
    </div>
  </body>
</html>
