<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#000000" />
    <meta name="color-scheme" content="dark" />
    <title>KABAL: Heirs of Ether</title>
    <meta name="description" content="KABAL: Heirs of Ether. A digital card table for friends. Move and flip cards freely, follow the official rulebook." />
    <link rel="icon" type="image/svg+xml" href="/assets/icon-dark.svg" media="(prefers-color-scheme: dark)" />
    <link rel="icon" type="image/svg+xml" href="/assets/icon-light.svg" media="(prefers-color-scheme: light)" />
    <link rel="icon" type="image/svg+xml" href="/assets/icon.svg" />
    <link rel="apple-touch-icon" href="/assets/icon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="alternate" hreflang="en" href="/?lang=en" />
    <link rel="alternate" hreflang="tr" href="/?lang=tr" />
    <link rel="alternate" hreflang="x-default" href="/" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="KABAL: Heirs of Ether" />
    <meta property="og:description" content="A digital card table for friends. No forced rules; follow the rulebook yourselves." />
    <meta property="og:image" content="/assets/og.svg" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
    <script type="module" src="/src/main.ts"></script>
    <style>
      /* Critical loading-screen styles, inline so the splash paints on the very
         first frame, before the bundle CSS arrives. Kept tiny and self-contained.
         The board is hidden until body.is-ready so the rotation / card positions
         settle behind the splash and never visibly snap into place. */
      html, body { margin: 0; background: #050507; }
      #app { opacity: 0; transition: opacity 360ms cubic-bezier(0.2, 0.65, 0.18, 0.99); }
      body.is-ready #app { opacity: 1; }
      #kabal-loader {
        position: fixed; inset: 0; z-index: 100000;
        display: grid; place-items: center;
        background:
          radial-gradient(120% 90% at 50% 40%, rgba(74, 66, 98, 0.18) 0%, rgba(8, 8, 12, 0) 58%),
          linear-gradient(180deg, #08070b 0%, #050506 60%, #030304 100%);
        opacity: 1; transition: opacity 360ms cubic-bezier(0.2, 0.65, 0.18, 0.99);
      }
      body.is-ready #kabal-loader { opacity: 0; pointer-events: none; }
      body.is-ready #kabal-loader * { animation-play-state: paused; }
      .kabal-loader__mark { position: relative; width: 64px; height: 86px; }
      .kabal-loader__mark svg { width: 100%; height: 100%; display: block; color: #f3efe5; animation: kabal-pulse 1.8s ease-in-out infinite; }
      .kabal-loader__ring {
        position: absolute; left: 50%; top: 50%; width: 116px; height: 116px;
        margin: -58px 0 0 -58px; border-radius: 50%;
        border: 1px solid rgba(243, 239, 229, 0.10);
        border-top-color: rgba(243, 239, 229, 0.55);
        animation: kabal-spin 1.1s linear infinite;
      }
      @keyframes kabal-spin { to { transform: rotate(360deg); } }
      @keyframes kabal-pulse { 0%, 100% { opacity: 0.55; } 50% { opacity: 1; } }
      @media (prefers-reduced-motion: reduce) {
        .kabal-loader__mark svg, .kabal-loader__ring { animation: none; }
      }
    </style>
  </head>
  <body>
    <div id="kabal-loader" aria-hidden="true">
      <div class="kabal-loader__mark">
        <span class="kabal-loader__ring"></span>
        <svg viewBox="0 0 48 64" xmlns="http://www.w3.org/2000/svg">
          <g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M24 4 L40 32 L24 60 L8 32 Z" />
            <path d="M24 4 L24 60" stroke-width="1.4" />
            <circle cx="24" cy="32" r="3.4" fill="currentColor" stroke="none" />
          </g>
        </svg>
      </div>
    </div>
    <div id="app" aria-live="polite"></div>
    <div id="boot-fail" hidden>
      <div class="boot-fail__card">
        <span class="boot-fail__sigil" aria-hidden="true">
          <svg viewBox="0 0 48 64" xmlns="http://www.w3.org/2000/svg">
            <g fill="none" stroke="#f3efe5" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M24 4 L40 32 L24 60 L8 32 Z" />
              <path d="M24 4 L24 60" />
              <circle cx="24" cy="32" r="3.5" fill="#f3efe5" stroke="none" />
            </g>
          </svg>
        </span>
        <h1>Something went wrong.</h1>
        <p>KABAL could not start. Try reloading the page.</p>
        <button type="button" data-reload>Reload</button>
      </div>
    </div>
    <noscript>
      <div class="boot-fail__noscript">
        KABAL requires JavaScript. Please enable it to play.
      </div>
    </noscript>
  </body>
</html>
