<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
    <title>KABAL: Eterin Varisleri | Hafif Multiplayer Masa</title>
    <meta name="description" content="KABAL: Eterin Varisleri için hafif, Vercel uyumlu, gerçek zamanlı kart masası MVP'si." />
    <meta name="theme-color" content="#050505" />
    <meta property="og:title" content="KABAL: Eterin Varisleri" />
    <meta property="og:description" content="Arkadaşlarla oynanabilen karanlık ve asil kart masası MVP'si." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/assets/og.svg" />
    <link rel="icon" href="/assets/icon.svg" />
    <link rel="apple-touch-icon" href="/assets/icon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main id="app" class="app-shell" aria-label="KABAL kart masası">
      <section class="topbar" aria-label="Oyun aksiyonları">
        <div class="brand-lockup" aria-hidden="true">
          <span class="brand-mark">K</span>
          <span class="brand-text">KABAL</span>
        </div>
        <div class="top-actions">
          <button id="copyLinkBtn" class="ui-button" type="button">Invite</button>
          <button id="rulesBtn" class="ui-button" type="button">Rules</button>
          <button id="supportBtn" class="ui-button" type="button">Support</button>
          <button id="leaveBtn" class="ui-button danger" type="button">Leave</button>
        </div>
      </section>

      <aside id="roomBadge" class="room-badge" aria-live="polite">
        <span class="room-label">Room</span>
        <strong id="roomCode">...</strong>
        <small id="syncStatus">local table</small>
      </aside>

      <section id="zoneTop" class="player-zone zone-top is-empty" data-seat="top">
        <span class="zone-label">Waiting</span>
      </section>
      <section id="zoneLeft" class="player-zone zone-left is-empty" data-seat="left">
        <span class="zone-label">Waiting</span>
      </section>
      <section id="zoneRight" class="player-zone zone-right is-empty" data-seat="right">
        <span class="zone-label">Waiting</span>
      </section>
      <section id="zoneBottom" class="player-zone zone-bottom is-self" data-seat="bottom">
        <span class="zone-label">Your hand</span>
      </section>

      <section id="board" class="board" aria-label="Kart masası"></section>
      <div id="cursorLayer" class="cursor-layer" aria-hidden="true"></div>

      <aside class="shortcut-hint" aria-label="Kısayollar">
        <strong>Controls</strong>
        <span>Drag: move</span>
        <span>Right click / F: flip</span>
        <span>Ctrl + drag: stack move</span>
        <span>Ctrl + G: gather</span>
        <span>Ctrl + M: mix</span>
      </aside>

      <div id="toast" class="toast" role="status" aria-live="polite"></div>
    </main>

    <section id="modalLayer" class="modal-layer" aria-hidden="true">
      <article class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <button id="modalClose" class="modal-close" type="button" aria-label="Kapat">×</button>
        <div id="modalContent"></div>
      </article>
    </section>

    <script type="module" src="/src/app.js"></script>
  </body>
</html>
