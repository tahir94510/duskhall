<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#000000" />
    <meta name="color-scheme" content="dark" />
    <meta name="duskhall-mode" content="zan" />
    <!-- DUSKHALL:BRAND:START -->
    <title>Duskhall</title>
    <meta name="description" content="Duskhall: a shared digital card table for friends. Pick a game, gather round, play by the rulebook. No servers, no accounts." />
    <link rel="icon" type="image/svg+xml" href="/assets/icon-dark.svg" media="(prefers-color-scheme: dark)" />
    <link rel="icon" type="image/svg+xml" href="/assets/icon-light.svg" media="(prefers-color-scheme: light)" />
    <link rel="icon" type="image/svg+xml" href="/assets/icon.svg" />
    <link rel="apple-touch-icon" href="/assets/icon.svg" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Duskhall" />
    <meta property="og:title" content="Duskhall" />
    <meta property="og:description" content="A shared digital card table for friends. Pick a game, gather round, play by the rulebook." />
    <meta property="og:image" content="/assets/og.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Duskhall" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="/assets/og.png" />
    <script>
      /* Per-mode tab titles for the pre-boot localiser below. The Vite plugin rewrites this for
         each mode shell; this default is the platform (root) title. */
      window.__DUSKHALL_TITLES__ = { en: "Duskhall", tr: "Duskhall" };
    </script>
    <!-- DUSKHALL:BRAND:END -->
    <!-- Localise the tab title AND the static boot-failure card BEFORE the bundle loads, using the
         same priority as i18n.detectLocale (?lang= -> localStorage "duskhall:lang" -> navigator
         language). Without this, a Turkish visitor briefly sees English. The title source is the
         per-mode window.__DUSKHALL_TITLES__ set above. -->
    <script>
      (function () {
        try {
          var titles = window.__DUSKHALL_TITLES__ || { en: "Duskhall", tr: "Duskhall" };
          var fail = {
            en: { h: "Something went wrong.", p: "The game could not start. Try reloading the page.", b: "Reload" },
            tr: { h: "Bir şeyler ters gitti.", p: "Oyun başlatılamadı. Sayfayı yeniden yüklemeyi dene.", b: "Yeniden yükle" }
          };
          var q = new URLSearchParams(location.search).get("lang");
          var stored = null;
          try { stored = localStorage.getItem("duskhall:lang") || localStorage.getItem("vaerum:lang"); } catch (e) {}
          var nav = (navigator.language || "en").toLowerCase();
          var loc = (q && titles[q]) ? q
                  : (stored && titles[stored]) ? stored
                  : nav.indexOf("tr") === 0 ? "tr" : "en";
          if (titles[loc]) document.title = titles[loc];
          document.documentElement.setAttribute("lang", loc);
          var f = fail[loc] || fail.en;
          document.addEventListener("DOMContentLoaded", function () {
            var h = document.getElementById("boot-fail-title");
            var p = document.getElementById("boot-fail-text");
            var b = document.querySelector("#boot-fail [data-reload]");
            if (h) h.textContent = f.h;
            if (p) p.textContent = f.p;
            if (b) b.textContent = f.b;
          });
        } catch (e) {}
      })();
    </script>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="alternate" hreflang="en" href="/?lang=en" />
    <link rel="alternate" hreflang="tr" href="/?lang=tr" />
    <link rel="alternate" hreflang="x-default" href="/" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
    <script type="module" src="/src/main.ts"></script>
    <style>
      /* Critical loading-screen styles, inline so the splash paints on the very first frame,
         before the bundle CSS arrives. The board is hidden until body.is-ready so the rotation
         and card positions settle behind the splash and never visibly snap into place. */
      html, body { margin: 0; background: #050507; }
      body {
        background-color: #07060b;
        background-image:
          radial-gradient(120% 90% at 50% 32%, rgba(96, 86, 126, 0.28) 0%, rgba(20, 18, 28, 0) 58%),
          radial-gradient(150% 120% at 50% 120%, rgba(54, 47, 74, 0.30) 0%, rgba(8, 8, 12, 0) 64%),
          linear-gradient(180deg, #0c0a12 0%, #08070b 52%, #050406 100%);
        background-repeat: no-repeat;
        background-size: cover;
      }
      #app { opacity: 1; }
      /* The loader is a translucent, blurred veil so the table's atmosphere shows through behind
         it instead of a flat opaque colour. Just the logo and its gentle pulse. */
      #app-loader {
        position: fixed; inset: 0; z-index: 100000;
        display: grid; place-items: center;
        background: rgba(8, 7, 12, 0.28);
        -webkit-backdrop-filter: blur(26px) saturate(118%);
        backdrop-filter: blur(26px) saturate(118%);
        opacity: 1; transition: opacity 360ms cubic-bezier(0.2, 0.65, 0.18, 0.99);
      }
      body.is-ready #app-loader { opacity: 0; pointer-events: none; }
      body.is-ready #app-loader * { animation-play-state: paused; }
      .app-loader__mark { position: relative; width: 64px; height: 86px; }
      .app-loader__mark svg, .app-loader__mark img { width: 100%; height: 100%; display: block; color: #f3efe5; animation: app-pulse 1.8s ease-in-out infinite; filter: drop-shadow(0 2px 12px rgba(0,0,0,0.5)); }
      .app-loader__mark img { object-fit: contain; }
      @keyframes app-pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
      @media (prefers-reduced-motion: reduce) {
        .app-loader__mark svg, .app-loader__mark img { animation: none; }
      }
    </style>
  </head>
  <body>
    <div id="app-loader" aria-hidden="true">
      <div class="app-loader__mark">
        <svg viewBox="0 0 48 64" xmlns="http://www.w3.org/2000/svg">
          <g fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M8 58 V24 A16 16 0 0 1 40 24 V58" />
            <path d="M3 58 H45" />
            <circle cx="24" cy="21" r="5" fill="currentColor" stroke="none" />
          </g>
        </svg>
      </div>
    </div>
    <div id="app" aria-live="polite"></div>
    <div id="boot-fail" hidden>
      <div class="boot-fail__card">
        <span class="boot-fail__sigil" aria-hidden="true">
          <svg viewBox="0 0 48 64" xmlns="http://www.w3.org/2000/svg">
            <g fill="none" stroke="#f3efe5" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
              <path d="M8 58 V24 A16 16 0 0 1 40 24 V58" />
              <path d="M3 58 H45" />
              <circle cx="24" cy="21" r="5" fill="#f3efe5" stroke="none" />
            </g>
          </svg>
        </span>
        <h1 id="boot-fail-title">Something went wrong.</h1>
        <p id="boot-fail-text">The game could not start. Try reloading the page.</p>
        <button type="button" data-reload>Reload</button>
      </div>
    </div>
    <noscript>
      <div class="boot-fail__noscript">
        Duskhall requires JavaScript. Please enable it to play. · Duskhall oynamak için JavaScript gerektirir; lütfen etkinleştir.
      </div>
    </noscript>
  </body>
</html>
